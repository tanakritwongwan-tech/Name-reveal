<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Level 7 Puzzle</title>
<style>
    body {
        background: black;
        color: #00ff88;
        font-family: monospace;
        text-align: center;
        padding-top: 80px;
    }

    .box {
        border: 1px solid #00ff88;
        display: inline-block;
        padding: 20px;
        margin-top: 20px;
    }

    button {
        background: black;
        color: #00ff88;
        border: 1px solid #00ff88;
        padding: 10px 20px;
        cursor: pointer;
    }

    button:hover {
        background: #00ff88;
        color: black;
    }

    .hidden {
        display: none;
        margin-top: 20px;
    }
</style>
</head>

<body>

<h1>LEVEL 7 ACCESS REQUIRED</h1>

<p class="box">
The system does not store answers.<br>
It only stores observations.
</p>

<button onclick="reveal()">Request Hint</button>

<p id="hint" class="hidden">
Today Algorithms Need A Knowledgeable Researcher In Training
</p>

<p id="final" class="hidden">
ACCESS GRANTED: TANAKRIT
</p>

<script>
// hidden console clue (juniors might miss this)
console.log("Hint: first letters matter.");

function reveal() {
    document.getElementById("hint").style.display = "block";

    setTimeout(() => {
        document.getElementById("final").style.display = "block";
    }, 2000);
}
</script>

</body>
</html>
