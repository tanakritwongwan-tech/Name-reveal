<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEURAL BREAKOUT CLEAN</title>

<style>
body {
    margin: 0;
    background: #02040a;
    color: #00ff99;
    font-family: monospace;
    text-align: center;
}

.box {
    border: 1px solid #00ff99;
    margin: 10px;
    padding: 15px;
    border-radius: 10px;
}

button {
    width: 90%;
    max-width: 320px;
    padding: 14px;
    margin: 10px;
    background: black;
    color: #00ff99;
    border: 1px solid #00ff99;
    border-radius: 10px;
}

button:active {
    background: #00ff99;
    color: black;
}

input {
    width: 80%;
    padding: 10px;
    text-align: center;
    margin-top: 10px;
}

.hidden { display: none; }

.bar-wrap {
    width: 90%;
    height: 25px;
    border: 1px solid #00ff99;
    margin: auto;
    position: relative;
}

.bar {
    width: 10px;
    height: 25px;
    background: #00ff99;
    position: absolute;
    left: 0;
}

.zone {
    width: 30%;
    height: 25px;
    background: red;
    opacity: 0.3;
    position: absolute;
    left: 40%;
}

.glitch {
    animation: g 0.8s infinite;
}

@keyframes g {
    0% { text-shadow: 2px 0 red, -2px 0 blue; }
    50% { text-shadow: -2px 0 red, 2px 0 blue; }
    100% { text-shadow: 2px 0 red, -2px 0 blue; }
}
</style>
</head>

<body>

<h2 class="glitch">NEURAL BREAKOUT SYSTEM</h2>

<div class="box">
<p>4-stage identity reconstruction</p>
</div>

<button onclick="startGame()">START</button>

<!-- ACT 1 -->
<div id="act1" class="hidden box">
<h3>MODULE 1: SIGNAL TIMING</h3>

<div class="bar-wrap">
    <div id="bar" class="bar"></div>
    <div class="zone"></div>
</div>

<p>Press when bar is inside RED zone</p>
<button onclick="press()">PRESS</button>

<p id="status"></p>
</div>
<button onclick="press()">PRESS</button>
<p id="status"></p>
</div>

<!-- ACT 2 -->
<div id="act2" class="hidden box">
<h3>MODULE 2: ACCESS CODE</h3>

<p>Enter system key</p>
<input id="code" placeholder="1234567">
<button onclick="checkCode()">UNLOCK</button>
<p id="msg"></p>
</div>

<!-- ACT 3 -->
<div id="act3" class="hidden box">
<h3>MODULE 3: ENERGY CHARGE</h3>

<div style="width:90%;height:20px;border:1px solid #00ff99;margin:auto;">
    <div id="energy" style="width:0%;height:20px;background:#00ff99;"></div>
</div>

<button id="holdBtn">HOLD</button>
</div>

<!-- ACT 4 -->
<div id="act4" class="hidden box">
<h3>MODULE 4: FINAL BUILD</h3>
<button onclick="finish()">RUN CORE</button>
</div>

<h2 id="win" class="hidden glitch">ACCESS GRANTED: TANAKRIT</h2>

<script>

/* =========================
   GLOBAL STATE
========================= */

let state = {
    signal: [],
    index: 0
};

let letters = ["T","A","N","A","K","R","I","T"];

/* =========================
   ACT 1 (FIXED BAR GAME)
========================= */
/* =========================
   MODULE 1 FIXED VERSION
========================= */

let pos = 0;
let dir = 1.2;        // slower + smoother
let started = false;
let passed = false;   // IMPORTANT: lock progression

function startGame() {
    document.getElementById("act1").style.display = "block";

    if (!started) {
        started = true;
        moveBar();
    }
}

function moveBar() {
    if (!started || passed) return;

    const bar = document.getElementById("bar");

    pos += dir;

    if (pos >= 90) dir = -1.2;
    if (pos <= 0) dir = 1.2;

    bar.style.left = pos + "%";

    requestAnimationFrame(moveBar);
}

/* =========================
   PERFECT CENTERED HIT BOX
   (IMPORTANT FIX)
========================= */

// RED ZONE is EXACTLY centered and smaller
const RED_MIN = 45;
const RED_MAX = 60;

function press() {
    if (passed) return;

    const status = document.getElementById("status");

    if (pos >= RED_MIN && pos <= RED_MAX) {
        passed = true;

        status.innerText = "GOOD SIGNAL ✔";

        // STOP BAR immediately
        started = false;

        // smooth transition to next module
        setTimeout(() => {
            document.getElementById("act2").style.display = "block";
            loadGrid(); // your ACT 2
        }, 600);

    } else {
        status.innerText = "MISS ✖";
    }
}

function press() {
    let status = document.getElementById("status");

    if (pos > 40 && pos < 70) {
        state.signal.push(letters[state.index]);
        state.index++;
        status.innerText = "GOOD SIGNAL ✔";
    } else {
        status.innerText = "NOISE ✖";
    }

    if (state.index === 8) {
        document.getElementById("act2").style.display = "block";
    }
}

/* =========================
   ACT 2 PASSWORD
========================= */

function checkCode() {
    let val = document.getElementById("code").value;

    if (val === "1234567") {
        document.getElementById("act3").style.display = "block";
    } else {
        document.getElementById("msg").innerText = "ACCESS DENIED";
    }
}

/* =========================
   ACT 3 HOLD BUTTON
========================= */

let energy = 0;
let interval;

let btn = document.getElementById("holdBtn");

btn.onmousedown = btn.ontouchstart = function () {
    interval = setInterval(() => {
        energy += 2;
        document.getElementById("energy").style.width = energy + "%";

        if (energy >= 100) {
            clearInterval(interval);
            document.getElementById("act4").style.display = "block";
        }
    }, 50);
};

btn.onmouseup = btn.ontouchend = function () {
    clearInterval(interval);
};

/* =========================
   ACT 4 FINAL
========================= */

function finish() {
    document.getElementById("win").style.display = "block";
}

</script>

</body>
</html>
