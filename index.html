<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEURAL BREAKOUT PRO</title>

<style>
body {
    margin: 0;
    background: #02040a;
    color: #00ff99;
    font-family: monospace;
    text-align: center;
}

h1 { margin-top: 20px; }

.box {
    border: 1px solid #00ff99;
    margin: 10px;
    padding: 15px;
    border-radius: 10px;
}

button {
    width: 90%;
    max-width: 320px;
    padding: 14px;
    margin: 10px;
    background: black;
    color: #00ff99;
    border: 1px solid #00ff99;
    border-radius: 10px;
}

button:active {
    background: #00ff99;
    color: black;
}

.hidden { display: none; }

.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin: 10px;
}

.cell {
    border: 1px solid #00ff99;
    padding: 12px;
    cursor: pointer;
    user-select: none;
}

.glitch {
    animation: glitch 0.8s infinite;
}

@keyframes glitch {
    0% { text-shadow: 2px 0 red, -2px 0 blue; }
    50% { text-shadow: -2px 0 red, 2px 0 blue; }
    100% { text-shadow: 2px 0 red, -2px 0 blue; }
}

.bar-wrap {
    width: 90%;
    height: 25px;
    border: 1px solid #00ff99;
    margin: auto;
    position: relative;
}

.bar {
    width: 10px;
    height: 25px;
    background: #00ff99;
    position: absolute;
    left: 0;
}

.zone {
    width: 30%;
    height: 25px;
    background: red;
    opacity: 0.3;
    position: absolute;
    left: 40%;
}
</style>
</head>

<body>

<h1 class="glitch">NEURAL BREAKOUT SYSTEM</h1>

<div class="box">
<p>4-stage identity reconstruction protocol</p>
</div>

<button onclick="startGame()">START</button>

<!-- ACT 1 -->
<div id="act1" class="hidden box">
<h3>MODULE 1: SIGNAL TIMING</h3>

<div class="bar-wrap">
    <div id="bar" class="bar"></div>
    <div class="zone"></div>
</div>

<button onclick="press()">PRESS SIGNAL</button>
<p id="status"></p>
</div>

<!-- ACT 2 -->
<div id="act2" class="hidden box">
<h3>MODULE 2: ROUTE GRID</h3>
<div class="grid" id="grid"></div>
<p id="routeText"></p>
</div>

<!-- ACT 3 -->
<div id="act3" class="hidden box">
<h3>MODULE 3: MEMORY REPAIR</h3>
<p id="brokenText"></p>
<button onclick="repair()">REPAIR SYSTEM</button>
</div>

<!-- ACT 4 -->
<div id="act4" class="hidden box">
<h3>MODULE 4: FINAL ASSEMBLY</h3>
<button onclick="finalize()">RUN CORE</button>
</div>

<h2 id="win" class="hidden glitch">ACCESS GRANTED: TANAKRIT</h2>

<script>

/* =========================
   CLEAN STATE SYSTEM
========================= */

const GAME = {
    signal: [],
    route: [],
    fixed: [],
    final: []
};

const letters = ["T","A","N","A","K","R","I","T"];

/* =========================
   STAGE CONTROL
========================= */

function startGame() {
    document.getElementById("act1").style.display = "block";
    startBar();
}

/* =========================
   ACT 1: TIMING BAR GAME
========================= */

let pos = 0;
let dir = 2;
let index = 0;

function startBar() {
    requestAnimationFrame(moveBar);
}

function moveBar() {
    const bar = document.getElementById("bar");

    pos += dir;

    if (pos > 90 || pos < 0) dir *= -1;

    bar.style.left = pos + "%";

    requestAnimationFrame(moveBar);
}

function press() {
    const status = document.getElementById("status");

    if (pos > 40 && pos < 70) {
        GAME.signal.push(letters[index]);
        status.innerText = "GOOD SIGNAL ✔";
        index++;
    } else {
        status.innerText = "NOISE ✖";
    }

    if (index === 8) {
        setTimeout(() => {
            document.getElementById("act2").style.display = "block";
            loadGrid();
        }, 500);
    }
}

/* =========================
   ACT 2: GRID ROUTING
========================= */

const gridData = [
    "T",".",".","X",
    ".","A",".",".",
    ".",".","N",".",
    ".",".",".","A"
];

function loadGrid() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    gridData.forEach(v => {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.innerText = v;

        cell.onclick = () => {
            if (v !== "." && v !== "X") {
                GAME.route.push(v);
                document.getElementById("routeText").innerText =
                    "ROUTE: " + GAME.route.join(" ");
            }

            if (GAME.route.length >= 4) {
                document.getElementById("act3").style.display = "block";
                document.getElementById("brokenText").innerText =
                    "T _ N A K _ I T";
            }
        };

        grid.appendChild(cell);
    });
}

/* =========================
   ACT 3: REPAIR MODULE
========================= */

function repair() {
    GAME.fixed = ["T","A","N","A","K","R","I","T"];
    document.getElementById("act4").style.display = "block";
}

/* =========================
   ACT 4: FINAL BUILD
========================= */

function finalize() {
    GAME.final = GAME.fixed.join("");

    if (GAME.final === "TANAKRIT") {
        document.getElementById("win").style.display = "block";
    }
}

</script>

</body>
</html>
